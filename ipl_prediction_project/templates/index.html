<!DOCTYPE html>
<html>
<head>
<title>IPL Winning Team Prediction</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

.container{
width:520px;
margin:auto;
margin-top:70px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

select,input{
width:100%;
padding:10px;
margin:8px 0;
font-size:15px;
}

button{
background:#ff4d4d;
color:white;
border:none;
padding:12px;
width:100%;
font-size:16px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#cc0000;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>IPL Winning Team Prediction</h2>

<form method="POST">

<label>Batting Team</label>
<select name="batting_team" required>
<option value="" disabled selected>Select Batting Team</option>
<option>Chennai Super Kings</option>
<option>Mumbai Indians</option>
<option>Royal Challengers Bengaluru</option>
<option>Kolkata Knight Riders</option>
<option>Sunrisers Hyderabad</option>
<option>Delhi Capitals</option>
<option>Punjab Kings</option>
<option>Rajasthan Royals</option>
<option>Lucknow Super Giants</option>
<option>Gujarat Titans</option>
</select>

<label>Bowling Team</label>
<select name="bowling_team" required>
<option value="" disabled selected>Select Bowling Team</option>
<option>Chennai Super Kings</option>
<option>Mumbai Indians</option>
<option>Royal Challengers Bengaluru</option>
<option>Kolkata Knight Riders</option>
<option>Sunrisers Hyderabad</option>
<option>Delhi Capitals</option>
<option>Punjab Kings</option>
<option>Rajasthan Royals</option>
<option>Lucknow Super Giants</option>
<option>Gujarat Titans</option>
</select>

<label>Venue</label>
<select name="venue" required>
<option value="" disabled selected>Select Venue</option>
<option>M Chinnaswamy Stadium</option>
<option>Wankhede Stadium</option>
<option>Eden Gardens</option>
<option>MA Chidambaram Stadium</option>
<option>Arun Jaitley Stadium</option>
<option>Rajiv Gandhi International Stadium</option>
<option>Narendra Modi Stadium</option>
<option>Sawai Mansingh Stadium</option>
<option>PCA Stadium Mohali</option>
<option>BRSABV Ekana Stadium</option>
</select>

<label>Target Score</label>
<input type="number" name="target" placeholder="Enter Target Score" required>

<label>Current Score</label>
<input type="number" name="score" placeholder="Enter Current Score" required>

<label>Overs Completed</label>
<input type="number" step="0.1" name="overs" placeholder="Enter Overs Completed" required>

<label>Wickets Lost</label>
<input type="number" name="wickets" placeholder="Enter Wickets Lost" required>

<button type="submit">Predict Winner</button>

</form>

{% if winner %}

<div class="result">

Predicted Winner<br><br>
{{winner}}

</div>

{% endif %}

</div>

</body>
</html>
